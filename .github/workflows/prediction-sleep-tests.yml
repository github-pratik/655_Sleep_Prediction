name: Prediction Sleep Tests

on:
  push:
    paths:
      - "prediction-sleep/**"
      - ".github/workflows/prediction-sleep-tests.yml"
  pull_request:
    paths:
      - "prediction-sleep/**"
      - ".github/workflows/prediction-sleep-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prediction-sleep/requirements.txt

      - name: Run regression tests
        run: |
          python -m unittest discover -s prediction-sleep/tests
